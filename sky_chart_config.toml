[render]
# Visual style / density
theme = "light"                      # "light" | "dark" | Arkaplan/tema. "light" beyaz, "dark" siyah.
show_azimuth_scale = true            # Dis cemberde azimut derece halkasi (0-360) ve N/E/S/W gostergeleri.
label_constellations = true          # Takimyildiz isimlerini yazar. Kapaticaksan daha sade gorunur.
label_bright_stars = false           # Bazi parlak yildiz adlarini yazar (Vega, Sirius gibi). Acmak kalabaligi arttirir.
star_mode = "all"                    # "none" hic yildiz yok, "constellations" sadece cizgilerdeki yildizlar, "all" tum gorunen yildizlar.
magnitude_limit = 6.0                # Yildiz parlaklik siniri. Buyutursen (6.5->7.0) daha cok yildiz; kucultursen daha az yildiz.
min_star_size = 1.1                  # Cok kucuk yildizlari hic cizmez. Artir (1.2->2.0) = daha az yildiz/temiz; azalt = daha yogun.
star_size_min = 0.75                 # En kucuk yildiz boyutu (scatter size). Artir = en kucuk noktalar daha gorunur.
star_size_max = 6.0                  # En buyuk yildiz boyutu. Artir = parlak yildizlar daha belirgin; cok artirirsan "balon" olur.
star_size_gamma = 1.8                # Dagilim egimi. Buyut (1.25->1.6) = parlaklar daha hizli buyur; kucult (1.25->1.0) = daha uniform.
star_alpha = 1.0                     # Yildiz opakligi. Dusur (1.0->0.7) = daha yumusak/daha az baskin.
emphasize_constellation_vertices = true   # Takimyildiz kose yildizlarini ekstra buyuk cizer. Poster icin genelde kapali daha iyi.
constellation_line_width = 0.6       # Takimyildiz cizgi kalinligi. Artir = cizgiler daha belirgin; azalt = daha minimal.
constellation_line_alpha = 0.7       # Takimyildiz cizgi opakligi (0-1). Artir = daha koyu; azalt = daha soluk.
ecliptic_alpha = 0.35                # Ekliptik (kesikli) cizginin opakligi. Artir = daha belirgin; azalt = daha soluk.

# Kose noktasi (vertex) boyutlari: emphasize_constellation_vertices=true iken gecerli
vertex_size_min = 3.0                # Kose yildizlarinin minimum boyutu.
vertex_size_max = 22.0               # Kose yildizlarinin maksimum boyutu (cok artirma, balon olur).
vertex_size_gamma = 1.2              # Dagilim egimi (parlaklarin ne kadar daha hizli buyudugu).
vertex_alpha = 0.95                  # Kose yildizlarinin opakligi.

# Location label text rendered at bottom (optional)
location_name = "Unspecified"        # Altta yazan konum adi (serbest metin). Or: "Istanbul, TR"

[[charts]]
output_file = "istanbul_now.pdf"
latitude = 41.0082
longitude = 28.9784
time_utc = "now"                     # "now" ya da ISO-8601 (or: "2026-02-12T11:50:00Z"). UTC kabul edilir.

[[charts]]
output_file = "equator_example.pdf"
latitude = 0.0
longitude = 0.0
time_utc = "2026-02-12T11:50:00Z"    # Ornek: sabit zaman. Zorunlu format: ISO-8601 ve tercihen 'Z' ile UTC.

